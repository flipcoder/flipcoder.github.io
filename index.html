<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flipcoder.com | Grady O'Connell's Software and Music Portfolio</title>
    <!-- Include animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <!-- Optional: Include jQuery for dynamic animations -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Add Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <!-- Add Inter font to the Google Fonts link in head -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <!-- Add Font Awesome in the head section -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Add Comic Neue font -->
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400&display=swap" rel="stylesheet">
    <!-- Add Patrick Hand font -->
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <!-- Add Roboto font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <!-- Add Permanent Marker font -->
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" type="text/css">
    <script src="./index.js" type="application/javascript" defer></script>
</head>
<body>
    <div class="stars"></div>
    <div class="page-wrapper">
    <div class="container">
        <div class="site-title">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>flipcoder</span>
                <span style="display: flex; align-items: center;">
                    Grady O'Connell
                    <a href="mailto:flipcoder@gmail.com" style="margin-left: 8px; color: #fff; text-decoration: none;">
                        <i class="fas fa-envelope"></i>
                    </a>
                </span>
            </div>
        </div>
        <!-- Animated Navbar -->
        <nav class="navbar">
            <a href="#" class="site-logo" data-section="projects">
                <img src="images/pfp.jpg" alt="Profile Picture">
            </a>
            <ul class="nav-links">
                <li><a href="#projects" data-section="projects"><i class="fas fa-code"></i>Projects</a></li>
                <li><a href="#music" data-section="music"><i class="fas fa-music"></i>Music</a></li>
                <li><a href="#shelf" data-section="shelf"><i class="fas fa-book"></i>Shelf</a></li>
                <li><a href="#contact" data-section="contact"><i class="fas fa-envelope"></i>Contact</a></li>
            </ul>
            <div class="social-links">
                <a href="https://github.com/flipcoder" target="_blank" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://twitter.com/flipcoder" target="_blank" title="X (Twitter)">
                    <span>X</span>
                </a>
                <a href="https://soundcloud.com/flipcoder" target="_blank" title="SoundCloud">
                    <i class="fab fa-soundcloud"></i>
                </a>
                <a href="https://youtube.com/@flipcoder" target="_blank" title="YouTube">
                    <i class="fab fa-youtube"></i>
                </a>
            </div>
        </nav>

       <!-- Centered PFP Image and Message Bubble -->
        <div class="animate__animated animate__fadeIn pfp-message-container">
            <a href="#" class="pfp-container" data-section="projects">
                <img src="images/pfp.jpg" alt="Profile Picture" class="pfp">
                <div class="eye-socket-left"></div>
                <div class="eye-socket-right"></div>
                <div class="eye-left"></div>
                <div class="eye-right"></div>
            </a>
            <!-- Message Bubble -->
            <div class="message-bubble">
                <p>Hi, I'm Flipcoder! I'm a developer, designer, and musician. Welcome to my new page!</p>
            </div>
        </div>

        <br/>

        <!-- Content will be loaded dynamically into this container -->
        <div id="content"></div>
    </div>
</div>

<div class="footer">
    <p id="copyright"></p>
    </div>

</body>
</html>
